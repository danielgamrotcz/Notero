name: Notero
options:
  bundleIdPrefix: cz.danielgamrot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.7.1

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"

targets:
  Notero:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Sources/Resources/Assets.xcassets
      - path: Sources/Resources/preview.css
    dependencies:
      - target: NoteroShareExtension
      - package: Sparkle
    info:
      path: Notero-Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: cz.danielgamrot.Notero
            CFBundleURLSchemes:
              - notero
        SUFeedURL: https://danielgamrot.cz/notero/appcast.xml
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.danielgamrot.Notero
        INFOPLIST_KEY_CFBundleDisplayName: Notero
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: Notero.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  NoteroShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.danielgamrot.Notero.ShareExtension
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.share-services
        INFOPLIST_KEY_NSExtension_NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"

  NoteroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Notero
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.danielgamrot.NoteroTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Notero.app/Contents/MacOS/Notero"
        BUNDLE_LOADER: "$(TEST_HOST)"
